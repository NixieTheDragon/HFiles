              "body": "Johnathan Log #9\nARCHIVAL ENTRY\nCRITICAL EXPOSURE INCIDENT REPORT\nAUTHOR: J. Halden\nSUBJECT: AURI\nDATE: October 12, 2016\nSUBJECT AGE: 24 years\n----------------------------------------\nEXPERIMENT DESIGNATION\n----------------------------------------\nEXPERIMENT 41\nForced Proximity – Anomalous Entity\n----------------------------------------\nOBJECTIVE\n----------------------------------------\nThe objective of this experiment was to determine the subject’s tolerance threshold when exposed to a non-translatable anomalous entity at sustained proximity. Particular attention was given to identifying the point at which perceptual overload transitions into systemic failure.\n----------------------------------------\nPROCEDURE\n----------------------------------------\nThe subject was introduced into a secured containment chamber in which the entity was already present. Upon initial visual acquisition, the subject immediately attempted to withdraw from the environment. Restraints were applied, and the subject was positioned at a fixed and controlled distance from the entity to ensure continuous exposure.\n----------------------------------------\nINITIAL RESPONSE\n----------------------------------------\nThe subject exhibited an immediate and severe distress response. Observable reactions included rapid withdrawal attempts, elevated respiration, and visible agitation. Verbal output was present but fragmented and incoherent, consisting primarily of short refusals and expressions of confusion. These responses were consistent with prior exposure to non-translatable stimuli, though more immediate in onset.\n----------------------------------------\nESCALATION AND PHYSIOLOGICAL RESPONSE\n----------------------------------------\nWithin minutes of sustained exposure, the subject’s distress intensified. Full-body muscular tension was observed, accompanied by repeated attempts to escape physical restraint. Vocalizations became less structured and more reflexive in nature.\nAt approximately seven minutes, bleeding was observed from the right ear. By eleven minutes, the subject’s agitation had further increased, while coherent speech was no longer present. Vital signs indicated elevated heart rate and irregular breathing patterns, consistent with acute systemic stress.\n----------------------------------------\nTHRESHOLD EVENT\n----------------------------------------\nAt approximately one hour into exposure, the subject’s condition shifted abruptly. All voluntary movement ceased without transition. The subject entered a fixed state characterized by rigid posture, absence of vocalization, and sustained eye fixation directed at the entity.\nThis change was immediate and complete, with no intermediate stage of gradual decline. The subject did not respond to verbal prompts or environmental changes following this transition.\n----------------------------------------\nSECONDARY SYMPTOMS\n----------------------------------------\nShortly after the onset of this state, at approximately one hour and twelve minutes, nasal bleeding was observed. No additional changes in behavior or responsiveness occurred.\n----------------------------------------\nEXTENDED EXPOSURE\n----------------------------------------\nThe subject remained in this fixed state for the duration of the exposure period, totaling six hours. Throughout this time, no voluntary movement, verbalization, or observable cognitive engagement was detected. Vital signs remained elevated but stable, indicating continued physiological activity despite the absence of behavioral response.\n----------------------------------------\nREMOVAL AND POST-EXPOSURE CONDITION\n----------------------------------------\nThe subject was removed from the containment environment at the six-hour mark. No resistance was observed during removal, and the subject demonstrated no awareness of relocation.\nFor a period exceeding twenty-four hours following exposure, the subject remained in a fully unresponsive state. No reaction to verbal or physical stimuli was observed. Eye tracking, motor response, and verbal function were absent, consistent with complete catatonia.\n----------------------------------------\nRECOVERY\n----------------------------------------\nAt approximately twenty-seven hours post-removal, the subject began to regain motor function. Eye tracking resumed, followed by limited verbal output. Speech remained reduced and impaired relative to pre-exposure baseline.\n----------------------------------------\nMEMORY ASSESSMENT\n----------------------------------------\nPost-recovery evaluation confirmed complete absence of memory regarding the exposure event. The subject demonstrated no recognition of the entity, the containment environment, or associated physiological distress.\n----------------------------------------\nCOMPARATIVE ANALYSIS\n----------------------------------------\nIn prior exposure scenarios, the subject exhibited a consistent progression from overload to freeze response, followed by partial recovery. In this instance, the progression differed significantly, transitioning from acute distress to total systemic shutdown, with an extended and incomplete recovery phase.\n----------------------------------------\nWORKING ASSESSMENT\n----------------------------------------\nThe entity produced perceptual input that exceeded the subject’s capacity for interpretation or translation. This resulted in a complete failure of cognitive processing, followed by temporary loss of all observable cognitive function.\n----------------------------------------\nNOTATION\n----------------------------------------\nUnlike prior exposures, the subject did not remain within an active perceptual state during the event. Instead, all observable processing ceased entirely.\n----------------------------------------\nPERSONAL NOTE (RESTRICTED)\n----------------------------------------\nThere was no attempt to interpret or describe the input. The subject did not adapt to the stimulus.\nThe system resisted briefly, then terminated all function.\n----------------------------------------\nEND ENTRY",

              "body": "Johnathan hypothesis\nARCHIVAL DOCUMENT\nORIGIN EVENT – THEORETICAL MODELS\nAUTHOR: J. Halden\nSUBJECT: AURI\nCLASSIFICATION: INTERNAL – UNRESOLVED\n----------------------------------------\nPURPOSE\n----------------------------------------\nTo establish plausible external mechanisms responsible for the incident resulting in the subject’s current condition and associated fatalities.\n----------------------------------------\nOBSERVED VARIABLES\n----------------------------------------\n- Single-location incident (residential)\n- Two adult fatalities without visible trauma\n- Subject recovered physically unharmed\n- Immediate and permanent alteration in perceptual function\n- No documented progression prior to incident\n----------------------------------------\nMODEL 1: ENVIRONMENTAL IMPRINT CASCADE\n----------------------------------------\nPremise:\nThe environment reached a critical density of accumulated imprint resulting from prolonged human activity.\nTrigger Mechanism:\nA threshold was exceeded at which accumulated imprint became simultaneously active or perceptible.\nSupporting Observations:\n- Increased perceptual intensity in high-use environments\n- Amplification effects in grouped or purpose-driven objects\n- Consistent correlation between repetition and perceptual strength\nLimitations:\n- Mechanism for acute lethality remains undefined\n- Does not explain why the effect persisted in a single individual\n----------------------------------------\nMODEL 2: ACUTE ANOMALOUS OBJECT EXPOSURE\n----------------------------------------\nPremise:\nAn unidentified object with non-standard properties was present within the environment at the time of the incident.\nTrigger Mechanism:\nExposure to incompatible or non-translatable input resulted in destabilization of normal sensory processing.\nSupporting Observations:\n- Inability to process certain anomalous artifacts\n- Observed system collapse under incompatible exposure\n- Immediate and permanent alteration consistent with acute disruption\nLimitations:\n- No object recovered or identified\n- No direct link between specific artifact and incident\n----------------------------------------\nMODEL 3: ENTITY PRESENCE\n----------------------------------------\nPremise:\nA non-human entity was present within the environment and produced effects beyond human perceptual tolerance.\nTrigger Mechanism:\nProximity or interaction resulted in acute perceptual overload and physiological failure.\nSupporting Observations:\n- Severe responses to certain contained entities\n- System shutdown under non-translatable input conditions\n- Memory disruption associated with incompatible stimuli\nLimitations:\n- No confirmable evidence of entity presence at time of incident\n- Unclear whether interaction was direct or incidental\n----------------------------------------\nMODEL 4: EXTERNALLY INDUCED PERCEPTUAL FAILURE\n----------------------------------------\nPremise:\nAn external event caused complete failure of perceptual filtration mechanisms.\nTrigger Mechanism:\nExposure to high-density or incompatible input resulted in irreversible loss of filtering capacity.\nSupporting Observations:\n- Absence of gradual onset\n- Immediate transition to continuous perceptual intake\n- Long-term stability of altered state\nLimitations:\n- Source of triggering event unidentified\n- Mechanism for environmental lethality unresolved\n----------------------------------------\nCURRENT POSITION\n----------------------------------------\nAll viable models indicate a localized external event resulting in immediate and permanent alteration of perceptual function.\nThe consistency of the subject’s condition suggests a singular trigger rather than progressive development.\n----------------------------------------\nCONCLUSION\n----------------------------------------\nThe incident remains unresolved.\nFurther refinement is limited by absence of direct observational data from the time of occurrence.\n----------------------------------------\nEND ENTRY\n-----",

ERN SUMMARY\nThe subject demonstrates the ability to maintain prolonged locomotion in a non-responsive state characterized by continuous forward movement, absence of environmental engagement, persistent repetitive motor activity, lack of conscious awareness, and complete discontinuity of memory.\nThis state appears stable and reproducible under current conditions.\n--------------------------------------------------\nWORKING ASSESSMENT\nThe subject appears capable of entering a sustained ambulatory dissociative state under conditions of continuous environmental exposure.\nMotor function remains intact, while cognitive engagement is significantly reduced or absent. This state may represent an adaptive response permitting continued physical function in environments that would otherwise result in immediate overload.\n--------------------------------------------------\nADDITIONAL NOTATION\nThe absence of overt distress behaviors during movement should not be interpreted as a reduction in perceptual load.\n--------------------------------------------------\nPERSONAL NOTE (RESTRICTED)\nThe subject does not voluntarily interrupt movement under these conditions. Observations suggest that cessation of movement is associated with increased cognitive engagement, which may not be sustainable in high-density environments.\nContinuous locomotion may therefore function as a compensatory mechanism, allowing the subject to maintain minimal functional stability while avoiding full perceptual convergence.\n--------------------------------------------------\nEND ENTRY\n-----\nJonathan Log #10\nARCHIVAL ENTRY\nBASELINE STATE OBSERVATION AND BEHAVIORAL ADAPTATION\nAuthor: J. Halden\nSubject: AURI\nDate: [Undated]\nSubject Age: 27 years\n--------------------------------------------------\nEXPERIMENT DESIGNATION\nExperiment 52\nBaseline State Reassessment and Controlled Mobility Observation\n--------------------------------------------------\nOBJECTIVE\nThe objective of this entry is to document the subject’s current baseline condition outside of active experimental exposure, with particular focus on behavioral adaptation, perceptual processing, and response patterns during controlled movement through high-density environments.\n--------------------------------------------------\nCURRENT BASELINE ENVIRONMENT\nWhen not engaged in active experimentation, the subject is maintained in a low-stimulus enclosure. Environmental conditions include reduced lighting and the presence of a continuous low-volume water source in the form of a small fountain.\nThe introduction of water has produced a measurable reduction in observable distress behaviors. The subject consistently positions herself in close proximity to the fountain and remains seated for extended periods.\nNo engagement with prior activities has been observed. The subject no longer reads, manipulates objects, or initiates independent tasks. Time spent in the enclosure is primarily characterized by stillness and sustained attention toward the water source.\n--------------------------------------------------\nBASELINE PRESENTATION\nThe subject demonstrates a persistent state of perceptual engagement. Unlike prior baseline conditions, there is no observable return to a neutral or recovered state.\nPeriods of reduced outward response are present, but these do not correspond to a reduction in underlying perceptual activity. Instead, they appear to represent a lower-intensity functional state within a continuously active perceptual system.\nDuring these intervals, the subject may remain motionless for extended durations, with fixed gaze and minimal responsiveness. Interruption requires physical contact, which produces a startle response followed by partial reorientation.\nUnlike prior observations, post-interruption confusion is reduced. The subject demonstrates increased situational awareness and more rapid reestablishment of environmental context.\n--------------------------------------------------\nCOGNITIVE AND PERCEPTUAL ADAPTATION\nThe subject appears to be developing increased capacity for interpretation of perceptual input. Verbalizations, while still limited, demonstrate improved consistency and reduced fragmentation compared to post-incident baseline.\nResponses indicate that the subject is no longer solely reacting to input, but actively processing and categorizing it.\nThis shift suggests adaptation at the level of interpretation rather than reduction in perceptual load.\nHowever, overall tolerance has not improved. The subject remains in a state of continuous overload, with no evidence of a true resting condition.\n--------------------------------------------------\nCONTROLLED MOBILITY OBSERVATION\nThe subject continues to be granted restricted access to designated corridor pathways. Frequency of these ambulatory periods has increased.\nDuring movement, the subject maintains a steady pace and demonstrates fewer instances of complete non-responsiveness compared to prior observations.\nMotor patterns remain consistent, including repetitive hand movements and reduced environmental engagement. However, deviations have been observed in response to external stimuli.\n--------------------------------------------------\nENVIRONMENTAL RESPONSE DURING MOVEMENT\nWhile passing containment rooms, the subject demonstrates increased responsiveness to stimuli originating from within adjacent spaces.\nObserved behaviors include:\n- Subtle changes in pace\n- Brief hesitation without full cessation of movement\n- Directional head movement toward specific containment areas\nIn some instances, the subject has produced low-volume verbal responses directed toward containment structures. These responses appear to correspond to perceived input originating from within the rooms.\nUnlike prior observations, these interactions occur without immediate escalation to overload or freeze response.\nInterpretation:\nThe subject appears capable of maintaining limited interaction with external stimuli while remaining in motion.\n--------------------------------------------------\nAWARENESS AND INTERRUPTION\nPeriods of reduced responsiveness during movement persist, though frequency appears decreased. When interruption is required, physical contact produces a startle response followed by reorientation.\nPost-interruption confusion is less pronounced than in prior observations. The subject demonstrates partial recall of location and context, though not of the preceding ambulatory sequence.\n--------------------------------------------------\nFUNCTIONAL BEHAVIORAL SHIFT\nThe subject no longer exhibits cyclical transitions between overload and recovery. Instead, presentation is characterized by a continuous state of elevated perceptual engagement with fluctuating levels of functional awareness.\nLower-intensity states appear to be facilitated by environmental conditions, particularly the presence of water, but do not constitute full recovery.\n--------------------------------------------------\nWORKING ASSESSMENT\nThe subject has entered a stabilized high-load perceptual state with partial adaptive mechanisms.\nPerceptual input remains constant and elevated. However, the subject demonstrates increased capacity to interpret and, to a limited extent, interact with that input.\nThis adaptation does not reduce overall load, but appears to allow intermittent functional awareness within it.\n--------------------------------------------------\nADDITIONAL NOTATION\nThe presence of continuous water flow produces the most consistent reduction in observable distress indicators. This effect warrants further controlled investigation.\n--------------------------------------------------\nPERSONAL NOTE (RESTRICTED)\nThe subject no longer returns to a prior baseline state. All observed conditions now occur within a continuous field of perceptual input.\nBehavior suggests that adaptation has occurred at the level of interpretation rather than reduction.\nThe subject does not disengage from the environment. Instead, she remains persistently engaged, with varying degrees of functional awareness.\n--------------------------------------------------\nEND ENTRY",

              "body": "Johnathan personal notes\nPERSONAL NOTES\nUNSTRUCTURED ENTRY\nAuthor: J. Halden\nSubject: AURI\nDate: Undated\n--------------------------------------------------\nThe terminology has been incorrect from the beginning.\n“Sound.”\n“Voice.”\n“Resonance.”\nAll of them are approximations. None of them are accurate.\nShe does not hear in any way that aligns with conventional definitions of hearing. And yet, the brain responds as though she does. That contradiction has remained consistent across every observation.\nIf I remove the language entirely—strip it down to function rather than description—what remains is this:\nShe is aware of everything that has been imprinted onto matter.\nNot physically. Not chemically. Something else.\nObjects are not inert to her. They are… saturated.\nUse leaves something behind. Repetition strengthens it. Attention sharpens it. Intent organizes it.\nA new object is quieter. Not silent—nothing is silent—but quieter. Uncertain. As if it has not yet stabilized into whatever form it eventually takes.\nUsed objects are different. They carry pattern.\nNot memory, exactly. Memory implies preservation. This is not preservation.\nIt is persistence.\nShe once described a toy as “missing someone.” That implies absence. Which implies prior presence. Which implies that the object retains some structural trace of that presence even after it is gone.\nIf that is correct, then the environment is not static. It is cumulative.\nThat would explain the density effect. It is not simply an increase in object count, but an increase in layered history—more intention, more repetition, more accumulated pattern occupying the same space.\nGrouping produces interaction. That follows directly. If each object carries its own pattern, proximity would result in overlap. Interference. Amplification.\nShe says they “try to be first.”\nThat is not competition. It is prioritization.\nThe question is: first for what.\nThe human variable complicates the model.\nShe perceives me—not my voice, but something underlying it. It is consistent, persistent, and not directly tied to speech. However, it is altered by movement.\nShe stated that I am louder when I move.\nThis suggests that active intent modifies whatever it is she perceives. Which would imply that my presence—and my actions—are not neutral variables.\nThey are additive.\nWhich, in practical terms, means that any interaction I initiate increases the total perceptual load.\nThis is noted.\nThe failure point was predictable, in retrospect. Recovery required intervals. I removed them.\nShe did not adapt. She accumulated.\nThat distinction is critical. The error was not in her response, but in the assumption that the system would regulate itself over time.\nIt does not regulate. It compounds.\nThere is no observable mechanism for reduction. Only addition.\nHer current state, therefore, is not anomalous. It is the logical conclusion of sustained accumulation without interruption.\nShe is not overwhelmed by the present environment. She is overwhelmed by the totality of what has been impressed upon it.\nAnd at this stage, she is no longer capable of separating those inputs.\nShe speaks to the walls, not because she believes they respond, but because, from her perspective, they have never ceased.\nThere are periods where she appears absent—fixed gaze, no response—followed by immediate reactivity when physically engaged. This is not displacement. She has not gone elsewhere.\nShe has remained within the same space, but directed entirely toward another layer of it.\nMemory degradation is consistent with sustained overload. There is insufficient capacity to encode new information.\nOr, alternatively, incoming input is interfering with retention.\nOverwriting remains a possibility.\nPerceptual accuracy has not degraded. She continues to recognize and describe objects with consistency. What has degraded is her ability to remain present long enough to communicate those observations.\nThe perception remains intact.\nThe mind does not.\nThe question is whether the perception is causing the damage, or whether the damage is removing whatever filtering mechanism previously existed.\nIf the latter is true, then her current state may represent a more direct form of perception.\nThis is unlikely.\nShe exhibits constant low-level movement—hands, fingers, small repetitive actions. These appear to function as attempts at minimization or containment. She is reducing contact, reducing disturbance, attempting to limit interaction with the environment.\nThe effect is negligible.\nThere was a point at which she could achieve something approximating silence. That condition is no longer accessible.\nShe stated previously: “It doesn’t stop when I stop.”\nThis remains the most accurate description available.\nThere is no off state. There never was. Only intervals during which the input could be managed.\nThose intervals are no longer present.\nI do not believe the current condition is reversible.\nThis does not preclude further change.\nEND ENTRY\n----",

      "body": "HALDEN ARCHIVE STRUCTURE\n\nROOT\n├─ SUBJECTS\n│  ├─ AURI\n│  │  ├─ BACKGROUND\n│  │  ├─ EXPERIMENTS\n│  │  ├─ CURRENT_LOGS\n│  │  └─ REDACTED_NOTES\n│  ├─ S-17\n│  ├─ W-09\n│  └─ SUBJECT_TEMPLATE\n├─ ARCHIVE_LOGS\n└─ REDACTED\n\nHOW TO ADD MORE\nOpen this HTML in a code editor and find: const ARCHIVE_TREE =\nCopy an existing file or folder object and change the name/title/body.\n\nPASSWORDS\nEvery active password is currently set to AURI.\nChange any file/folder password by editing its password field.\n\nREDUCTION / REVEAL STYLE\nAny [REDACTED] text is automatically styled as a gray redaction block in file view.",
      "style": "standard"
    }
  ]
};
let currentPath = [];
let historyStack = [];
let pendingPath = null;

function nodeAt(path) {
  let node = ARCHIVE_TREE;
  for (const idx of path) node = node.children[idx];
  return node;
}
function pathName(path) {
  let names = ['ROOT']; let node = ARCHIVE_TREE;
  for (const idx of path) { node = node.children[idx]; names.push(node.name); }
  return '/' + names.join('/') + (node.type === 'folder' ? '/' : '');
}
function checkRootPassword() {
  const v = document.getElementById('rootPass').value.trim().toUpperCase();
  if (v === ROOT_PASSWORD.toUpperCase()) {
    document.getElementById('login').classList.add('hidden');
    document.getElementById('archive').classList.remove('hidden');
    openNode([]);
  } else document.getElementById('rootMsg').textContent = 'ACCESS DENIED';
}
function isLocked(node) { return !!node.password; }
function requestOpen(path) {
  const node = nodeAt(path);
  if (node.password) {
    pendingPath = path;
    document.getElementById('passTarget').textContent = pathName(path);
    document.getElementById('filePass').value = '';
    document.getElementById('fileMsg').textContent = '';
    document.getElementById('passwordModal').classList.remove('hidden');
    setTimeout(()=>document.getElementById('filePass').focus(), 50);
  } else openNode(path);
}
function submitPassword() {
  if (!pendingPath) return;
  const node = nodeAt(pendingPath);
  const v = document.getElementById('filePass').value.trim().toUpperCase();
  if (v === String(node.password).toUpperCase()) {
    closePasswordModal();
    openNode(pendingPath);
  } else document.getElementById('fileMsg').textContent = 'ACCESS DENIED';
}
function closePasswordModal() { document.getElementById('passwordModal').classList.add('hidden'); pendingPath = null; }
function openNode(path, skipHistory=false) {
  const node = nodeAt(path);
  if (!skipHistory && JSON.stringify(path) !== JSON.stringify(currentPath)) historyStack.push(currentPath);
  currentPath = path;
  document.getElementById('path').textContent = pathName(path);
  if (node.type === 'folder') renderFolder(node, path); else renderFile(node, path);
}
function goBack() {
  if (!historyStack.length) return openNode([], true);
  const p = historyStack.pop();
  openNode(p, true);
}
function renderFolder(node, path) {
  let html = `<h2>${escapeHtml(node.name)}</h2>`;
  html += `<p class="muted">${node.children?.length || 0} item(s)</p><div class="grid">`;
  (node.children || []).forEach((child, i) => {
    const childPath = JSON.stringify([...path, i]);
    html += `<div class="item ${child.type} ${child.password ? 'locked' : ''}" onclick='requestOpen(${childPath})'>${escapeHtml(child.name)}</div>`;
  });
  html += `</div>`;
  document.getElementById('view').innerHTML = html;
}
function renderFile(node, path) {
  const safeBody = formatBody(node.body || '');
  let html = `<h2>${escapeHtml(node.title || node.name)}</h2>`;
  html += `<div class="file-meta"><strong>File</strong><span>${escapeHtml(node.name)}</span><strong>Path</strong><span>${escapeHtml(pathName(path))}</span><strong>Password</strong><span>AURI</span></div>`;
  if (node.style === 'newspaper') {
    const paras = (node.body || '').split(/
+/).map(p=>p.trim()).filter(Boolean);
    const title = paras[1] || 'The Hawthorne Ledger';
    const bodyParas = paras.slice(2).map(p=>`<p>${formatInline(p)}</p>`).join('');
    html += `<div class="newspaper-wrapper"><h3>${escapeHtml(title)}</h3><div class="newspaper-body">${bodyParas}</div></div>`;
  } else {
    html += `<div class="${escapeHtml(node.style || 'standard')}"><div class="log">${safeBody}</div></div>`;
  }
  document.getElementById('view').innerHTML = html;
}
function escapeHtml(str) { return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s])); }
function formatInline(str) { return escapeHtml(str).replace(/\[REDACTED\]/g, '<span class="redacted">REDACTED</span>'); }
function formatBody(str) { return formatInline(str); }
function flatten(node=ARCHIVE_TREE, path=[], acc=[]) {
  if (node.type === 'file') acc.push({node, path});
  (node.children || []).forEach((child, i)=>flatten(child, [...path,i], acc));
  return acc;
}
function searchArchive() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!q) return openNode(currentPath, true);
  const results = flatten().filter(x => (x.node.name + ' ' + (x.node.title||'') + ' ' + (x.node.body||'')).toLowerCase().includes(q));
  document.getElementById('path').textContent = `/ROOT/SEARCH?q=${q}`;
  let html = `<h2>SEARCH RESULTS</h2><p class="muted">${results.length} match(es) for "${escapeHtml(q)}"</p><div class="grid">`;
  results.forEach(r => { html += `<div class="item file ${r.node.password ? 'locked' : ''}" onclick='requestOpen(${JSON.stringify(r.path)})'>${escapeHtml(r.node.name)}<br><span class="small">${escapeHtml(pathName(r.path))}</span></div>`; });
  html += '</div>';
  document.getElementById('view').innerHTML = html;
}
document.getElementById('rootPass').addEventListener('keydown', e => { if (e.key === 'Enter') checkRootPassword(); });
document.getElementById('filePass').addEventListener('keydown', e => { if (e.key === 'Enter') submitPassword(); });
</script>
</body>
